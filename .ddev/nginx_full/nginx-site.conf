# Full nginx replacement: funnel every request — HTML, Vite HMR WebSocket, and
# the /v1/* API proxy — into the Vite dev server (port 5174) in this container.
# Without this the default nginx would try to serve index.html from disk and
# never reach Vite. (This *_full config fully replaces the default site.)

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    location / {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cold-start Vite rebuilds can be slow — avoid a 504 on the first hit.
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
